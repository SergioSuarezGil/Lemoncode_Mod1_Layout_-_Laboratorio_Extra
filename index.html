<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lemoncode</title>
    <link type="text/css" rel="stylesheet" href="css/styles.css" />

  <body class="page">
    <header class="layout-header">

        <input class="layout-header__search" placeholder="Buscar" />

      <nav class="sidebar">
        <div class="sidebar__menu">
          <div class="sidebar__title">Frameworks</div>

            <li class="sidebar__item">Svelte</li>
            <li class="sidebar__item">Vue</li>
            <li class="sidebar__item">Angular</li>
          </ul>
        </div>
      </nav>

      <main class="content">
        <div class="members-grid">
          <div class="member-card">
            <img class="member-card__avatar" src="https://avatars.githubusercontent.com/u/14540103?s=96&v=4" />
            <div class="member-card__name">Antonio Contreras</div>

          <div class="member-card">

            <div class="member-card__name">Francisco Javier de Jesús Mazzoni</div>
          </div>
          <div class="member-card">
            <img class="member-card__avatar" src="https://avatars.githubusercontent.com/u/24454225?s=96&v=4" />
            <div class="member-card__name">Javier Calzado</div>
          </div>
          <div class="member-card">
            <img class="member-card__avatar" src="https://avatars.githubusercontent.com/u/7754966?s=96&v=4" />

            <div class="member-card__name">Juan Pablo Martínez</div>
          </div>
          <div class="member-card">
            <img class="member-card__avatar" src="https://avatars.githubusercontent.com/u/4374977?s=96&v=4" />
            <div class="member-card__name">Daniel Sánchez</div>
          </div>
          <div class="member-card">
            <img class="member-card__avatar" src="https://avatars.githubusercontent.com/u/43609530?s=96&v=4" />
            <div class="member-card__name">Víctor Borrego</div>
